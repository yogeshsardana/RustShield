name: KUnit Tests

# KUnit tests are disabled for now because:
#   1. KUnit uses UML (User Mode Linux) which doesn't support Rust kernel modules
#   2. The Rust-for-Linux kernel requires native x86_64/aarch64 build targets
#   3. This workflow works in-tree only (requires full kernel source patching)
#
# To re-enable, rebuild the kernel with Rust support and run tests natively.
# See scripts/setup_dev_env.sh for local testing instructions.

on:
  push:
    branches: [never]  # disabled
  pull_request:
    branches: [never]  # disabled

jobs:
  kunit:
    name: KUnit behavioral equivalence tests
    runs-on: ubuntu-latest
    steps:
      - run: echo "KUnit tests disabled - see comments above"
