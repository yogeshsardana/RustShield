name: Verus Proofs

on:
  push:
    branches: [main, rustshield-ys1]
  pull_request:
    branches: [main, rustshield-ys1]

jobs:
  verus-proofs:
    name: Verify proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.0'
          components: rust-src, rustc-dev, llvm-tools-preview
      - name: Install Verus
        run: |
          git clone --depth 1 https://github.com/verus-lang/verus /tmp/verus
          cd /tmp/verus/tools/vargo
          cargo build --release
          cd /tmp/verus/source
          bash tools/get-z3.sh
          ../tools/vargo/target/release/vargo build --release
          cp z3 target/release/
          touch target/release/verus-root
          echo "/tmp/verus/source/target/release" >> $GITHUB_PATH
      - name: Run proof library verification
        run: |
          verus verus/verus_kernel_proofs/src/lib.rs
      - name: Run spec verification
        run: |
          verus verus/verus_spec/src/lib.rs
      # Example proofs omitted: e1000e_demo requires kernel tree
